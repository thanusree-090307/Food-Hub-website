<!DOCTYPE html>
<html>
<head>
    <title>Recipe Finder</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f5f5f5;
        }
        .image{
            background-image: url('BackgroundRecipeImage.png');
            height: 100vh;
            width: 100%;
            position: fixed;
            filter: brightness(60%);
            z-index: -1;
        }
        input {
            padding: 10px;
            width: 300px;
            
        }
        button {
          padding: 10px 20px;
          background-color: green;
          color: white;
          border: none;
          cursor: pointer;
        }
        #results {
          margin-top: 20px;
        }
    </style>
</head>

<body>
<div class="image"></div>
<h1 style="padding: 40px;">Search Required Recipe</h1>

<input type="text" id="searchInput" placeholder="Search food...">
<button onclick="searchFood()">Search</button>

<script>
function searchFood() {
  let value = document.getElementById("searchInput").value.toLowerCase();

  if (value === "veg") {
    window.location.href = "Project-3(Vegpage).HTML";
  } 
  else if (value === "non-veg" || value === "nonveg") {
    window.location.href = "Project-3(Non-veg page).HTML";
  } 
  else {
    alert("No results found");
  }
}
</script>
</script>

</body>
</html>
