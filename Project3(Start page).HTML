<!DOCTYPE html>
<html>
    <style>
        body{
            margin:0px;
            text-align: center;
            color:whitesmoke
        }
        .image{
            background-image: url(BackgroundRecipeImage.png);
            height: 100vh;
            width: 100%;
            position: fixed;
            filter: brightness(60%);
            z-index: -1;
        }
        header{
            font-size: xx-large;
            padding-top: 200px;
        }
             p{
            display: inline-block;
            width:300px;
            height:100px;
            border-radius: 20px;
            line-height: 100px;
            border: 3px solid orangered;
            font-size: x-large;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            margin: 0 20px;
        }
        p:hover{
            transition: transform 0.5s ease;
            transform: scale(1.1);
            background-color: orangered;
        }
    </style>
    <body>

            <div>
