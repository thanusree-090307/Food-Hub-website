<!DOCTYPE html>
<html>
<head>
    <title>Login & Sign Up</title>

    <style>
        body {
            font-family: Arial;
            background-color: white;
            text-align: center;
            margin-top: 80px;
        
        }
        .bg {
    
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: url("BackgroundRecipeImage.png"); 

    filter: blur(6px);   
    z-index: -1;
}

        .box {
            position: relative; 
            background: white;
            padding: 20px;
            width: 400px;
            height: 350px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 90%;
            border-radius: 5px;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            color: white;
            cursor: pointer;
        }

        .login-btn { background-color: green; }
        .signup-btn { background-color: orange; }
    </style>
</head>

<body>

<div class="box">
    <div class="bg"></div>
    <h2> Sign Up / Login </h2>
     
    <form>
    <input type="email" id="email" placeholder="Enter Email" required><br>

    
    <input type="text" id="phone" placeholder="Enter Phone Number" required><br>

    
    <input type="password" id="password" placeholder="Enter Password" required><br>
    <br>
    <button class="login-btn" ><a href="Project3(Start page).HTML" style="text-decoration: none; color: white;">Login</a></button>
    </form>

</div>
</body>
</html>
