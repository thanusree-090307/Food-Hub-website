<!DOCTYPE html>

<html>
<head>
<title>Food Hub</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#e3e5e8;
font-family:Arial;
text-align:center;

}
.image{
background-image: url(BackgroundRecipeImage.png);
height: 100vh;
width: 100%;
position: fixed;
filter: brightness(60%);
z-index: -1;
}
.container{
    background-color: rgb(238, 218, 180);
border: 2px solid orangered;
padding:70px;
border-radius:15px;
box-shadow:0px 4px 10px gray;
}

.container{
animation: fade 1s ease-in;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}

h1{
color:#0b0f4f;
}

h2{
color:#1c2a8a;
}

p{
color:#555;
}

button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:orange;
color:white;
cursor:pointer;
}

button:hover{
background:orangered;
}

</style>

</head>

<body>
<div class="image"></div>
<div class="container">

<h1>Food Hub</h1>
<p>Cook-Taste-Enjoy-Welcome to our recipe hub and catering services!</p>
<a href="Project-3(SingIn page).HTML">
<button>Get Started</button>
</a>

</div>

</body>
</html>
